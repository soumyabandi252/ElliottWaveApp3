name: Elliott Wave Scan

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Elliott Wave scan
        run: python elliott_wave_NASDAQ_FINAL_optimized.py

      - name: Commit updated workbook
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add Elliott_Wave_NASDAQ_Composite_Master_Workbook.xlsx
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Auto-update Elliott Wave scan results [skip ci]"
          git pull --rebase
          git push
